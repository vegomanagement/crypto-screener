name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (all modules)
        run: python -m py_compile decision.py llm_agents.py chart.py tracking.py screener.py webhook_server.py

      - name: Lint (ruff)
        # screener.py — legacy 4k-line file; игнорим стилистические
        # one-line if/else (E701/E702), оставляем только реальные баги
        run: |
          ruff check decision.py llm_agents.py chart.py tracking.py tests/
          ruff check screener.py --ignore E701,E702 webhook_server.py

      - name: Unit tests (pytest)
        run: pytest -v
