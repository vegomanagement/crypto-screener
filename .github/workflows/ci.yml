name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (all modules)
        run: python -m py_compile decision.py screener.py webhook_server.py

      - name: Lint (ruff)
        # scoped to new code only; full repo cleanup is out of scope
        run: ruff check decision.py tests/

      - name: Unit tests (pytest)
        run: pytest -v
